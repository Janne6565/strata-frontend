# Static SPA served by nginx-unprivileged on :8080.
# The API lives at /api on the same origin (routed to the backend by the
# Ingress), so nginx only serves the static bundle with a SPA fallback.
server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-cache fingerprinted assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Client-side routing: unknown paths fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
