name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  IMAGE: ghcr.io/janne6565/strata-frontend
  DEPLOY_REPO: janne6565/strata-deployment
  OVERLAY_PATH: overlays/main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Lint
        run: bun run lint
      - name: Type-check
        run: bun run typecheck
      - name: Test
        run: bun run test
      - name: Build
        run: bun run build

  deliver:
    needs: verify
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: meta
        run: echo "tag=main-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  bump-deployment:
    needs: deliver
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout deployment repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.DEPLOY_REPO }}
          # Write-scoped SSH deploy key registered on strata-deployment.
          ssh-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Install kustomize
        run: |
          curl -sSL "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Bump frontend image tag
        working-directory: ${{ env.OVERLAY_PATH }}
        run: kustomize edit set image ${{ env.IMAGE }}=${{ env.IMAGE }}:${{ needs.deliver.outputs.tag }}

      - name: Commit and push
        run: |
          git config user.name "strata-ci[bot]"
          git config user.email "strata-ci@users.noreply.github.com"
          git add ${{ env.OVERLAY_PATH }}/kustomization.yaml
          if git diff --cached --quiet; then
            echo "No image change to commit."
          else
            git commit -m "deploy(frontend): ${{ needs.deliver.outputs.tag }}"
            git push
          fi
